<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kriz | Home</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">Kriz</div>
      <ul class="nav-links" id="navLinks">
        <li><a href="home.html" class="active">Home</a></li>
        <li><a href="home.html#products">Shop</a></li>
        <li><a href="#" id="cartIconNav"><i class="fas fa-shopping-bag"></i> Cart (<span id="cartCount">0</span>)</a></li>
        <li><a href="#" id="profileIconNav"><i class="fas fa-user"></i> Profile</a></li>
      </ul>
      <div class="menu-icon" id="menuToggle"><i class="fas fa-bars"></i></div>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-text">
      <h1>New Essence Collection</h1>
      <p>Minimalist silhouettes, premium fabrics</p>
      <button class="btn-outline-light" onclick="location.href='#products-grid'">Shop now</button>
    </div>
  </section>

  <section class="products-section" id="products-grid">
    <h2>Editor's pick</h2>
    <div class="product-grid" id="productGrid">
      <!-- Product 1 -->
      <div class="product-card">
        <img src="https://i.pinimg.com/736x/50/6e/df/506edfb1b5bf3cab47800b5d779633c0.jpg" alt="Silk Midi Dress">
        <div class="product-info">
          <div class="product-name">Silk Midi Dress</div>
          <div class="product-price">$189</div>
          <button href="product.html" class="btn-details">View Details</button>
        </div>
      </div>
      <!-- Product 2 -->
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1581044777550-4cfa60707c03?w=600&h=800&fit=crop" alt="Linen Blend Shirt Dress">
        <div class="product-info">
          <div class="product-name">Linen Blend Shirt Dress</div>
          <div class="product-price">$149</div>
          <button href="product.html" class="btn-details" data-id="2">View Details</button>
        </div>
      </div>
      <!-- Product 3 -->
      <div class="product-card">
        <img src="https://i.pinimg.com/736x/61/07/15/610715f62f2618748a4fd9d23fbd1286.jpg" alt="Wool Tailored Coat">
        <div class="product-info">
          <div class="product-name">Wool Tailored Coat</div>
          <div class="product-price">$279</div>
          <button class="btn-details" data-id="3">View Details</button>
        </div>
      </div>
      <!-- Product 4 -->
      <div class="product-card">
        <img src="https://i.pinimg.com/736x/25/04/fa/2504fac12ee93b3f3bfb643ab58f0488.jpg" alt="Knitted Maxi Dress">
        <div class="product-info">
          <div class="product-name">Knitted Maxi Dress</div>
          <div class="product-price">$159</div>
          <button class="btn-details" data-id="4">View Details</button>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p>© Kriz — effortless luxury</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
