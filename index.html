<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chris | Login</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="login-body">
  <div class="auth-container fade-in">
    <div class="brand-header">
      <h1 class="logo">Kriz</h1>
      <p class="tagline">timeless elegance</p>
    </div>
    <div class="form-card">
      <h2>Create account / Sign in</h2>
      <form id="loginForm">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="fullName" placeholder="Full Name" required>
        </div>
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="Email" required>
        </div>
        <div class="input-group">
          <i class="fas fa-phone-alt"></i>
          <input type="tel" id="phone" placeholder="Phone Number" required>
        </div>
        <div class="input-group">
          <i class="fas fa-map-marker-alt"></i>
          <input type="text" id="address" placeholder="Shipping Address" required>
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Password" required>
        </div>
        <div id="formError" class="error-msg"></div>
        <button type="submit" class="btn-primary btn-full">Sign in & Continue</button>
      </form>
      <div class="divider">or</div>
      <button id="googleMockBtn" class="btn-google"><i class="fab fa-google"></i> Login with Google</button>
      <p class="legal-note">By joining you agree to Kriz style terms.</p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
