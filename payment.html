<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kriz | Payment</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <nav class="navbar"><div class="nav-container"><div class="logo">KRIZ</div><ul class="nav-links"><li><a href="home.html">Home</a></li></ul><div class="nav-actions"><button id="themeToggle4" class="theme-toggle-btn"><i class="fas fa-moon"></i></button></div></div></nav>
  <div class="payment-container glass-card">
    <h2>Secure Checkout</h2>
    <div class="payment-methods">
      <div class="method-card" data-method="upi"><i class="fab fa-google-pay"></i> UPI</div>
      <div class="method-card" data-method="card"><i class="fas fa-credit-card"></i> Card</div>
      <div class="method-card" data-method="cod"><i class="fas fa-truck"></i> Cash on Delivery</div>
    </div>
    <div id="paymentFields" class="payment-fields"></div>
    <button id="confirmOrderBtn" class="btn-primary btn-full">Confirm Order</button>
    <div id="paymentMessage" class="success-message"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
