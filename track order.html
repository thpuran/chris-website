<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kriz | Track Order</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <nav class="navbar"><div class="nav-container"><div class="logo">KRIZ</div><ul class="nav-links"><li><a href="home.html">Home</a></li><li><a href="#" id="trackOrdersLink">My Orders</a></li></ul><div class="nav-actions"><button id="themeToggle5" class="theme-toggle-btn"><i class="fas fa-moon"></i></button></div></div></nav>
  <div class="tracking-container">
    <h2>Order Tracking</h2>
    <div id="trackingOrderInfo" class="tracking-order-card"></div>
    <div class="timeline-container">
      <div class="timeline-step" data-step="placed"><i class="fas fa-check-circle"></i><span>Order Placed</span></div>
      <div class="timeline-step" data-step="packed"><i class="fas fa-box"></i><span>Packed</span></div>
      <div class="timeline-step" data-step="shipped"><i class="fas fa-shipping-fast"></i><span>Shipped</span></div>
      <div class="timeline-step" data-step="out"><i class="fas fa-truck"></i><span>Out for Delivery</span></div>
      <div class="timeline-step" data-step="delivered"><i class="fas fa-home"></i><span>Delivered</span></div>
    </div>
    <div class="progress-wrapper"><div class="progress-bar" id="trackProgressBar"></div></div>
    <p class="track-status-text" id="trackStatusMsg">Preparing your order...</p>
    <button id="simulateUpdateBtn" class="btn-secondary">Simulate real-time update</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
